name: secret-scan

on:
  push:
    branches: [main, 'rel/**']
  pull_request:
    branches: [main]

# Public-by-default means there is no private staging buffer: a leaked secret
# would be world-visible immediately. This gate fails the build on any finding
# so a credential can never silently land in the repo.
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (open-source binary, no license required)
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: dir /github/workspace --redact --no-banner --verbose
